apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  namespace: streaming
  labels:
    app: content-service
    version: "1.0.0"
    track: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-service
      track: stable
  template:
    metadata:
      labels:
        app: content-service
        version: "1.0.0"
        track: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: content-service
          imagePullPolicy: IfNotPresent
          image: ghcr.io/mini-streaming/content-service:latest
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PORT
              value: "8082"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
