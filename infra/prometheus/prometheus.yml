global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mini-streaming'
    environment: 'local'

rule_files:
  - /etc/prometheus/alerts.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:8080']
        labels:
          service: api-gateway
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: user-service
    static_configs:
      - targets: ['user-service:8081']
        labels:
          service: user-service
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: content-service
    static_configs:
      - targets: ['content-service:8082']
        labels:
          service: content-service
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: playback-service
    static_configs:
      - targets: ['playback-service:8083']
        labels:
          service: playback-service
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          service: otel-collector
    metrics_path: /metrics
    scrape_interval: 30s
